name: cake_shop
description: Cake Online Shopping App - Flutter frontend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  confetti: ^0.8.0
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
